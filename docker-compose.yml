services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spam-mail-classifier-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spam-mail-classifier-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend